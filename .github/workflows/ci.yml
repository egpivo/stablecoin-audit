name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (v0.1 default)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (experimental)
        run: cargo clippy --all-targets --features experimental -- -D warnings

      - name: Test (v0.1 default)
        run: cargo test --lib

      - name: Test (experimental)
        run: cargo test --lib --features experimental

      - name: Test (api)
        run: cargo test --lib --features api

      - name: Build release (v0.1 default)
        run: cargo build --release

      - name: Build release (experimental)
        run: cargo build --release --features experimental

      - name: Market-sentiment script tests (stdlib)
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v
