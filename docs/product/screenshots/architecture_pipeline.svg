<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 880" role="img" aria-labelledby="title desc">
  <title id="title">stablecoin-audit evidence pipeline (v0)</title>
  <desc id="desc">Read-only product stack: evidence browser, API, CLI workflows, Rust core.</desc>
  <defs>
    <style>
      .bg { fill: #f7f6f3; }
      .box { fill: #ffffff; stroke-width: 1.5; }
      .title { font-family: system-ui, -apple-system, Segoe UI, sans-serif; font-size: 15px; font-weight: 600; fill: #1a1917; }
      .body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; font-size: 12px; fill: #5c5850; }
      .mono { font-family: Menlo, Consolas, monospace; font-size: 11px; fill: #3d3a34; }
      .edge { font-family: system-ui, sans-serif; font-size: 11px; fill: #6b6560; font-style: italic; }
      .note { font-family: system-ui, sans-serif; font-size: 10px; fill: #8a847c; }
      .arrow { stroke: #4a4844; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4a4844"/>
    </marker>
  </defs>
  <rect class="bg" width="720" height="880"/>

  <text x="360" y="36" text-anchor="middle" class="title" font-size="17">stablecoin-audit - v0 product stack</text>
  <text x="360" y="56" text-anchor="middle" class="note">Evidence browser reads bytes; CLI produces artifacts; manifest defines claims</text>

  <rect class="box" x="80" y="78" width="560" height="88" rx="8" stroke="#ad1457"/>
  <text x="100" y="104" class="title">Evidence browser</text>
  <text x="100" y="124" class="body">/ui/ - run summary, claim boundaries, logs, artifacts, package</text>
  <text x="100" y="142" class="mono">No audit logic, no RPC, no new claims</text>

  <line class="arrow" x1="360" y1="166" x2="360" y2="192"/>
  <text x="360" y="184" text-anchor="middle" class="edge">HTTP (read-only v0.3)</text>

  <rect class="box" x="80" y="196" width="560" height="100" rx="8" stroke="#5e35b1"/>
  <text x="100" y="222" class="title">Thin API (axum)</text>
  <text x="100" y="242" class="body">GET runs, manifest, artifacts, package build / download / verify</text>
  <text x="100" y="260" class="mono">artifact_root jail (path_jail.rs)</text>
  <text x="100" y="278" class="note">GET does not re-run transfer-audit or call RPC</text>

  <line class="arrow" x1="360" y1="296" x2="360" y2="322"/>
  <text x="360" y="314" text-anchor="middle" class="edge">reads filesystem only</text>

  <rect x="80" y="328" width="560" height="72" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="100" y="352" class="title" fill="#1b5e20">artifact_manifest.json</text>
  <text x="100" y="372" class="body">product contract, checksums, workflow_steps, supported / unsupported claims</text>
  <text x="100" y="390" class="note">Listed in GET /api/runs only when transfer-audit succeeds</text>

  <line class="arrow" x1="360" y1="400" x2="360" y2="426"/>
  <text x="360" y="418" text-anchor="middle" class="edge">indexes artifacts on disk</text>

  <rect class="box" x="80" y="430" width="560" height="108" rx="8" stroke="#c45c26"/>
  <text x="100" y="456" class="title">CLI workflows</text>
  <text x="100" y="476" class="body">transfer-audit, cross-chain-summary, resolve-window, stablecoin-map-package</text>
  <text x="100" y="496" class="mono">out/{asset}/runs/{run_id}/</text>
  <text x="100" y="514" class="body">fetch, decode, QA gates, supply invariant, write artifacts + manifest</text>
  <text x="100" y="532" class="note">checkpoint / resume, RPC via local .env</text>

  <line class="arrow" x1="360" y1="538" x2="360" y2="564"/>
  <text x="360" y="556" text-anchor="middle" class="edge">invokes</text>

  <rect class="box" x="80" y="568" width="560" height="96" rx="8" stroke="#2d6a9f"/>
  <text x="100" y="594" class="title">Rust core library</text>
  <text x="100" y="614" class="body">audit, artifact, rpc, config, report, claims.rs</text>
  <text x="100" y="634" class="mono">transfer-audit = fetch, decode, QA, supply (single workflow)</text>
  <text x="100" y="652" class="note">Does not know HTTP routes or frontend frameworks</text>

  <rect x="80" y="688" width="560" height="88" rx="6" fill="#f5f5f5" stroke="#888" stroke-width="1"/>
  <text x="100" y="712" class="title" font-size="13">Canonical artifacts (filesystem)</text>
  <text x="100" y="732" class="mono">canonical_transfers.csv, supply_snapshots.csv, qa_report.json</text>
  <text x="100" y="750" class="mono">supply_audit.csv, provenance.json, execution_log.ndjson</text>
  <text x="100" y="768" class="note">Written by CLI; indexed by manifest, not directory scan</text>

  <rect x="200" y="792" width="320" height="56" rx="6" fill="#e8f4fc" stroke="#2d6a9f" stroke-width="1.5"/>
  <text x="360" y="816" text-anchor="middle" class="title">Audit request</text>
  <text x="360" y="834" text-anchor="middle" class="mono">--asset, --run-id, --window, configs/tokens/*.yml</text>

  <line class="arrow" x1="360" y1="568" x2="360" y2="792" stroke-dasharray="4 3"/>
  <text x="388" y="680" class="edge">produces</text>
</svg>
